<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="900" fill="#0D1117" />
  <defs>
    <filter id="depthShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.5" /></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <text x="600" y="50" font-family="Arial" font-size="28" font-weight="bold" text-anchor="middle" fill="#FFFFFF">OmniD3sk FINAL ARCHITECTURE</text>
  <line x1="500" y1="65" x2="700" y2="65" stroke="#1F6FEB" stroke-width="3" />
  <rect x="50" y="100" width="1100" height="120" rx="12" fill="#161B22" stroke="#30363D" filter="url(#depthShadow)" />
  <text x="70" y="130" font-family="Arial" font-size="14" font-weight="bold" fill="#58A6FF">FRONTEND (NEXT.JS + VITE)</text>
  <rect x="50" y="250" width="1100" height="120" rx="12" fill="#161B22" stroke="#30363D" filter="url(#depthShadow)" />
  <text x="70" y="280" font-family="Arial" font-size="14" font-weight="bold" fill="#238636">BACKEND (FASTAPI)</text>
  <rect x="50" y="400" width="530" height="150" rx="12" fill="#161B22" stroke="#30363D" filter="url(#depthShadow)" />
  <text x="70" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#8B949E">DATA (MONGODB/SQLITE)</text>
  <rect x="620" y="400" width="530" height="150" rx="12" fill="#161B22" stroke="#30363D" filter="url(#depthShadow)" />
  <text x="640" y="430" font-family="Arial" font-size="14" font-weight="bold" fill="#A371F7">AI (GEMINI 2.5 + ADK)</text>
  <rect x="50" y="580" width="1100" height="150" rx="12" fill="#161B22" stroke="#30363D" filter="url(#depthShadow)" />
  <text x="70" y="610" font-family="Arial" font-size="14" font-weight="bold" fill="#D29922">TOOL REGISTRY (NOTION/CALENDAR/SHIELD)</text>
</svg>
